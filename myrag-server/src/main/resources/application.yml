spring:
  application:
    name: myrag
  autoconfigure:
    exclude:
      - org.springframework.ai.model.zhipuai.autoconfigure.ZhiPuAiChatAutoConfiguration
      - org.springframework.ai.model.zhipuai.autoconfigure.ZhiPuAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.zhipuai.autoconfigure.ZhiPuAiImageAutoConfiguration
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/myrag?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:myrag}
    password: ${SPRING_DATASOURCE_PASSWORD:myrag}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  ai:
    model:
      chat: none
      embedding: none
      image: none
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3
    vectorstore:
      qdrant:
        host: ${SPRING_AI_VECTORSTORE_QDRANT_HOST:localhost}
        port: ${SPRING_AI_VECTORSTORE_QDRANT_PORT:6334}
    mcp:
      server:
        name: myrag-mcp
        version: 0.1.0
        protocol: STREAMABLE
        type: SYNC

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

myrag:
  ai:
    provider: ${AI_PROVIDER:dashscope}
    zhipuai:
      api-key: ${AI_ZHIPUAI_API_KEY:}
      base-url: ${AI_ZHIPUAI_BASE_URL:https://open.bigmodel.cn/api/paas}
  chat:
    router-model: qwen-turbo
    chat-model: qwen-plus
    max-user-tokens: 4096
    max-rag-context-tokens: 8192
    default-system-prompt: "你是一个专业的智能助手。请根据提供的知识库上下文回答用户问题。如果上下文中没有相关信息，请明确告知用户，不要编造内容。"
    cache:
      enabled: true
      ttl-hours: 24
      min-question-length: 2
  rag:
    hybrid:
      dense-limit: 20
      sparse-limit: 20
      final-top-k: 5
      fusion: rrf
      embedding-dimensions: 1024
  security:
    prompt-injection-enabled: true

logging:
  level:
    com.myrag: INFO
    org.springframework.ai: INFO
